spring:
  application:
    name: jme-deploymentlog-service

  jpa:
    database: postgresql
    show-sql: false
    generate-ddl: false
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: data
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    default-schema: data

server:
  servlet:
    context-path: /deploymentlog-service
