spring:
  application:
    name: jme-deploymentlog-service

  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    driver-class-name: org.postgresql.Driver
    hikari:
      schema: ${spring.jpa.properties.hibernate.default_schema}
  jpa:
    database: postgresql
    show-sql: false
    generate-ddl: false
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: data
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    default-schema: data

server:
  servlet:
    context-path: /${spring.application.name}

jeap:

  swagger:
    status: OPEN
  web:
    tls:
      enabled: false

